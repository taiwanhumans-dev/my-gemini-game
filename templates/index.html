<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>家長怒氣生存遊戲</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; }
        .progress-bar { width: 100%; background: #e4e6eb; height: 24px; border-radius: 12px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: #ff4d4d; width: 66.6%; transition: width 0.4s; }
        .history { height: 280px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; background: #fafafa; }
        .msg { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🤬 家長怒氣生存遊戲</h2>
        <select id="stage-select" onchange="changeStage()">
            <option value="0">1. 玄關晚歸</option><option value="1">2. 客廳電燈</option>
            <option value="2">3. 餐桌手機</option><option value="3">4. 晚餐遲到</option>
            <option value="4">5. 廚房洗碗</option><option value="5">6. 巷口垃圾</option>
            <option value="6">7. 換裝見人</option><option value="7">8. 房間整理</option>
            <option value="8">9. 開箱包裹</option><option value="9">10. 深夜水果</option>
        </select>
        <div class="progress-bar"><div id="anger-bar" class="progress-fill"></div></div>
        <p id="anger-text">🔥 家長怒氣值: 80 / 120</p>
        <div class="history" id="chat-history"><div class="msg">👵 長輩：『你還知道要回來啊？』</div></div>
        <input type="text" id="user-reply" placeholder="輸入回話...">
        <button onclick="sendReply()">送出</button>
    </div>
    <audio id="angry-sound" src="/static/angry.mp3"></audio>

    <script>
        let currentAnger = 80;
        async function changeStage() {
            const idx = parseInt(document.getElementById('stage-select').value);
            const res = await fetch('/api/change_stage', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({stage_idx: idx}) });
            const data = await res.json();
            document.getElementById('chat-history').innerHTML = `<div class="msg">👵 長輩：『${data.parent_speech}』</div>`;
            document.getElementById('anger-bar').style.width = '66.6%';
            currentAnger = 80;
        }

        async function sendReply() {
            const reply = document.getElementById('user-reply').value;
            const res = await fetch('/api/reply', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({reply: reply}) });
            const data = await res.json();
            
            if (data.anger > currentAnger) { document.getElementById('angry-sound').play(); }
            currentAnger = data.anger;
            
            document.getElementById('chat-history').innerHTML += `<div class="msg">😎 你：${reply}</div><div class="msg">👵 長輩：『${data.parent_speech}』</div>`;
            document.getElementById('anger-bar').style.width = `${(data.anger/120)*100}%`;
            if(data.status === "NEXT_STAGE") { document.getElementById('stage-select').value = parseInt(document.getElementById('stage-select').value) + 1; }
        }
    </script>
</body>
</html>
