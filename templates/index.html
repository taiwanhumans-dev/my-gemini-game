<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家長怒氣生存遊戲</title>
    <style>
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
        }
        .progress-bar { 
            width: 100%; 
            background: #e4e6eb; 
            height: 24px; 
            border-radius: 12px; 
            overflow: hidden; 
            margin: 20px 0; 
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #ff6b6b, #ff4d4d); 
            width: 66.6%; 
            transition: width 0.4s ease-in-out; 
        }
        .history { 
            border: 1px solid #e4e6eb; 
            height: 280px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #f9f9fa; 
            border-radius: 8px;
        }
        .msg { 
            margin-bottom: 12px; 
            padding: 10px 14px; 
            border-radius: 8px; 
            max-width: 85%;
            line-height: 1.5;
        }
        .parent-msg { 
            background: #ffebe9; 
            color: #d9383a;
            text-align: left; 
            margin-right: auto;
        }
        .user-msg { 
            background: #e7f3ff; 
            color: #0b61be;
            text-align: right; 
            margin-left: auto;
        }
        .system-msg {
            background: #eefbee;
            color: #2a7e2a;
            text-align: center;
            margin: 10px auto;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #006dd6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🤬 家長怒氣生存遊戲 (網頁版)</h2>
        <h3 id="stage-title">當前場景：玄關晚歸</h3>
        
        <div class="progress-bar">
            <div id="anger-bar" class="progress-fill"></div>
        </div>
        <p id="anger-text" style="font-weight: bold;">🔥 家長怒氣值: 80 / 120</p>

        <div class="history" id="chat-history">
            <div class="msg parent-msg">👵 長輩：『你還知道要回來啊？現在幾點了？全家都在等你！』</div>
        </div>

        <div id="input-area" class="input-group">
            <input type="text" id="user-reply" placeholder="輸入你的回話..." onkeydown="handleKeyDown(event)">
            <button onclick="sendReply()">送出回話</button>
        </div>
    </div>

    <script>
        function handleKeyDown(event) {
            if (event.key === "Enter") {
                sendReply();
            }
        }

        async function sendReply() {
            const inputEl = document.getElementById('user-reply');
            const replyText = inputEl.value.trim();
            if (!replyText) return;

            const historyEl = document.getElementById('chat-history');
            
            historyEl.innerHTML += `<div class="msg user-msg">😎 你：${replyText}</div>`;
            inputEl.value = ''; 
            historyEl.scrollTop = historyEl.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            historyEl.innerHTML += `<div class="msg parent-msg" id="${loadingId}">👵 長輩正在組織碎碎唸...</div>`;
            historyEl.scrollTop = historyEl.scrollHeight;

            try {
                const response = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reply: replyText })
                });
                
                const data = await response.json();

                document.getElementById(loadingId).remove();

                if (data.status === "GAME_OVER") {
                    historyEl.innerHTML += `<div class="msg parent-msg" style="color:red; font-weight:bold; background:#fff0f0; border:2px solid red;">👵 長輩：『${data.parent_speech} 跪下！』</div>`;
                    document.getElementById('input-area').innerHTML = `<div style="text-align:center; width:100%;"><h3 style="color:red;">💀 GAME OVER - 你被趕出家門了</h3><button onclick="location.reload()">重新挑戰</button></div>`;
                } else if (data.status === "GAME_WIN") {
                    document.getElementById('input-area').innerHTML = `<div style="text-align:center; width:100%;"><h3 style="color:green;">🎉 恭喜通關！今晚的風暴終於過去了。</h3><button onclick="location.reload()">再玩一次</button></div>`;
                } else {
                    historyEl.innerHTML += `<div class="msg parent-msg">👵 長輩：『${data.parent_speech}』</div>`;
                    
                    if (data.status === "NEXT_STAGE") {
                        historyEl.innerHTML += `<div class="msg system-msg">💡 成功安撫！長輩哼了一聲走向下一個地方...</div>`;
                    }
                }

                document.getElementById('stage-title').innerText = "當前場景：" + data.stage_task;
                document.getElementById('anger-text').innerText = `🔥 家長怒氣值: ${data.anger} / 120`;
                
                const percentage = (data.anger / 120) * 100;
                document.getElementById('anger-bar').style.width = `${percentage}%`;
                
                historyEl.scrollTop = historyEl.scrollHeight;

            } catch (error) {
                console.error("連線發生錯誤:", error);
                document.getElementById(loadingId).innerText = "👵 長輩：『氣到不想理你（連線異常）』";
            }
        }
    </script>
</body>
</html>
