<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>家長怒氣生存遊戲</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 20px auto; background: #f0f2f5; padding: 10px; transition: background 0.5s; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
        .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 80%; }
        .history { height: 350px; overflow-y: auto; padding: 15px; background: #e5ddd5; border-radius: 15px; margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg { max-width: 80%; margin: 8px; padding: 10px 15px; border-radius: 18px; }
        .parent-msg { align-self: flex-start; background: white; }
        .user-msg { align-self: flex-end; background: #86efac; color: #064e3b; }
    </style>
</head>
<body>
    <div id="intro-modal" class="overlay">
        <div class="modal">
            <h2 id="intro-task">請選擇關卡</h2>
            <p id="intro-desc">歡迎挑戰家長怒氣生存遊戲，請從選單開始你的旅程。</p>
            <button onclick="startGame()">開始挑戰</button>
        </div>
    </div>
    <div class="card">
        <h2>🤬 家長怒氣生存遊戲</h2>
        <select id="stage-select" onchange="changeStage()">
            <option value="0">1. 玄關晚歸</option><option value="1">2. 客廳電燈</option><option value="2">3. 餐桌手機</option>
            <option value="3">4. 晚餐遲到</option><option value="4">5. 廚房洗碗</option><option value="5">6. 巷口垃圾</option>
            <option value="6">7. 換裝見人</option><option value="7">8. 房間整理</option><option value="8">9. 開箱包裹</option><option value="9">10. 深夜水果</option>
        </select>
        <div class="history" id="chat-history"></div>
        <input type="text" id="user-reply" placeholder="輸入回話...">
        <button onclick="sendReply()">送出</button>
    </div>
    <div id="game-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h2 id="modal-title">挑戰結果</h2>
            <button onclick="location.reload()">重新遊玩</button>
        </div>
    </div>
    <audio id="angry-sound" src="/static/angry.mp3"></audio>

    <script>
        let currentAnger = 80;
        const bgs = ["#f0f2f5","#e8f5e9","#fff3e0","#fce4ec","#e3f2fd","#f3e5f5","#fff9c4","#efebe9","#e0f7fa","#fbe9e7"];

        function startGame() { document.getElementById('intro-modal').style.display = 'none'; document.querySelector('.card').style.display = 'block'; }
        
        async function changeStage() {
            const idx = parseInt(document.getElementById('stage-select').value);
            const res = await fetch('/api/change_stage', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({stage_idx: idx}) });
            const data = await res.json();
            document.body.style.backgroundColor = bgs[idx];
            document.getElementById('intro-modal').style.display = 'flex';
            document.getElementById('intro-task').innerText = data.stage_task;
            document.getElementById('intro-desc').innerText = data.desc;
            document.getElementById('chat-history').innerHTML = `<div class="msg parent-msg">👵 『${data.parent_speech}』</div>`;
            currentAnger = 80;
        }

        async function sendReply() {
            const input = document.getElementById('user-reply');
            const res = await fetch('/api/reply', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({reply: input.value}) });
            const data = await res.json();
            const history = document.getElementById('chat-history');
            history.innerHTML += `<div class="msg user-msg">😎 ${input.value}</div><div class="msg parent-msg">👵 『${data.parent_speech}』</div>`;
            if (data.anger > currentAnger) document.getElementById('angry-sound').play();
            currentAnger = data.anger;
            history.scrollTop = history.scrollHeight;
            input.value = '';
            if (data.status !== "OK") { document.getElementById('game-modal').style.display = 'flex'; document.getElementById('modal-title').innerText = data.status === "WIN" ? "🎉 挑戰成功！" : "💀 挑戰失敗！"; }
        }
    </script>
</body>
</html>
